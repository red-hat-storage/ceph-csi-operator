apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ceph-csi-operator.fullname" . }}-snapshot-controller-leaderelection
  labels:
  {{- include "ceph-csi-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - watch
  - list
  - delete
  - update
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ceph-csi-operator.fullname" . }}-snapshot-controller-leaderelection
  labels:
  {{- include "ceph-csi-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "ceph-csi-operator.fullname" . }}-snapshot-controller-leaderelection'
subjects:
- kind: ServiceAccount
  name: '{{ include "ceph-csi-operator.fullname" . }}-snapshot-controller'
  namespace: '{{ .Release.Namespace }}'
